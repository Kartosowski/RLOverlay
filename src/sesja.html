<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>RL Live Session Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800&display=swap');

        body {
            background-color: transparent;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
            overflow: hidden;
        }

        .overlay {
            background: linear-gradient(145deg, rgba(20, 20, 20, 0.9), rgba(10, 10, 10, 0.95));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 15px 45px 25px 45px;
            display: flex;
            gap: 50px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .overlay::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 3px;
            border-radius: 3px 3px 0 0;
            opacity: 0.8;
        }

        .stat-item {
            text-align: center;
            min-width: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .stat-item:nth-child(1)::after,
        .stat-item:nth-child(2)::after {
            content: "";
            position: absolute;
            right: -25px;
            top: 20%;
            height: 60%;
            width: 1px;
            background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.2), transparent);
        }

        .label {
            font-size: 16px;
            text-transform: uppercase;
            color: #dcdcdc;
            margin-bottom: 2px;
            font-weight: 700;
            letter-spacing: 0.15em;
        }

        .value,
        .delta-value {
            font-size: 46px;
            font-weight: 800;
            line-height: 1;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
        }

        .plus {
            color: #00ff88;
        }

        .minus {
            color: #ff3366;
        }

        .neutral {
            color: #aaaaaa;
        }

        .wins .value {
            color: #00ff88;
        }

        .losses .value {
            color: #ff3366;
        }

        .streak-info {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.95);
            padding: 6px 24px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            font-size: 18px;
            white-space: nowrap;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            letter-spacing: 0.08em;
            backdrop-filter: blur(5px);
        }

        .streak {
            color: #ffffff;
        }

        #win-streak::after {
            content: " Streak";
            color: inherit;
        }
    </style>
</head>

<body>
    <div class="overlay">
        <div class="stat-item wins">
            <div class="label">Wygrane</div>
            <div id="session-wins" class="value">0</div>
        </div>

        <div class="stat-item">
            <div class="label">MMR</div>
            <div id="mmr-delta" class="delta-value neutral">0</div>
        </div>

        <div class="stat-item losses">
            <div class="label">Przegrane</div>
            <div id="session-losses" class="value">0</div>
        </div>

        <div class="streak-info">
            <span id="win-streak">0</span>
        </div>
    </div>

    <script>
        const p = window.location.pathname.split('/');
        const mode = p[2];
        const nick = p[3];

        const trackerModes = {
            "1s": "1v1",
            "2s": "2v2",
            "3s": "3v3"
        };

        const modeMapping = {
            "1s": "Ranked Duel 1v1",
            "2s": "Ranked Doubles 2v2",
            "3s": "Ranked Standard 3v3"
        };

        function getRankData(rankName) {
            const r = rankName.toLowerCase();
            let img = "unranked.png";

            if (r.includes("supersonic")) { img = "ssl.png"; }
            else if (r.includes("grand champion")) {
                if (r.includes("iii")) img = "gc3.png";
                else if (r.includes("ii")) img = "gc2.png";
                else img = "gc1.png";
            } else if (r.includes("champion")) {
                if (r.includes("iii")) img = "c3.png";
                else if (r.includes("ii")) img = "c2.png";
                else img = "c1.png";
            } else if (r.includes("diamond")) {
                if (r.includes("iii")) img = "d3.png";
                else if (r.includes("ii")) img = "d2.png";
                else img = "d1.png";
            } else if (r.includes("platinum")) {
                if (r.includes("iii")) img = "p3.png";
                else if (r.includes("ii")) img = "p2.png";
                else img = "p1.png";
            } else if (r.includes("gold")) {
                if (r.includes("iii")) img = "g3.png";
                else if (r.includes("ii")) img = "g2.png";
                else img = "g1.png";
            } else if (r.includes("silver")) {
                if (r.includes("iii")) img = "s3.png";
                else if (r.includes("ii")) img = "s2.png";
                else img = "s1.png";
            } else if (r.includes("bronze")) {
                if (r.includes("iii")) img = "b3.png";
                else if (r.includes("ii")) img = "b2.png";
                else img = "b1.png";
            }

            return { img: "/img/" + img };
        }

        async function update() {
            try {
                const response = await fetch("/apiranga/" + nick);
                const data = await response.json();
                const apiModeName = modeMapping[mode] || modeMapping["2s"];
                const segment = data.data.segments.find(x => x.metadata.name === apiModeName);

                if (segment) {
                    const rankName = segment.stats.tier.metadata.name;
                    const v = getRankData(rankName);

                    document.getElementById('mode-label').innerText = trackerModes[mode] || "?";
                    document.getElementById('rank').innerText = rankName;
                    document.getElementById('mmr').innerText = segment.stats.rating.value;

                    const imgEl = document.getElementById('rank-img');
                    imgEl.src = v.img;
                    imgEl.style.display = "block";
                }
            } catch (e) { console.error(e); }
        }

        async function updateSession() {
            try {
                const progRes = await fetch('/apiprogram/');
                const progJson = await progRes.json();
                const programStartTime = new Date(progJson.czas_startu);

                const sessRes = await fetch(`/apisesja/${encodeURIComponent(nick)}`);
                const sessJson = await sessRes.json();
                const currentModeName = modeMapping[mode] || modeMapping["2s"];

                let w = 0, l = 0, delta = 0;
                let sessionMatches = [];

                if (sessJson.data && sessJson.data.items) {
                    sessJson.data.items.forEach(session => {
                        if (session.matches) {
                            session.matches.forEach(m => {
                                const matchDate = new Date(m.metadata.dateCollected);
                                if (
                                    m.metadata.isGrouped === false &&
                                    m.metadata.playlist === currentModeName &&
                                    matchDate > programStartTime
                                ) {
                                    sessionMatches.push(m);
                                    const matchWins = m.stats.wins ? m.stats.wins.value : 0;
                                    const matchPlayed = m.stats.matchesPlayed ? m.stats.matchesPlayed.value : 1;
                                    w += matchWins;
                                    l += (matchPlayed - matchWins);
                                    if (m.stats.rating && m.stats.rating.metadata && m.stats.rating.metadata.ratingDelta) {
                                        delta += m.stats.rating.metadata.ratingDelta;
                                    }
                                }
                            });
                        }
                    });
                }

                sessionMatches.sort((a, b) => new Date(a.metadata.dateCollected) - new Date(b.metadata.dateCollected));
                let currentStreak = 0;
                sessionMatches.forEach(m => {
                    const isWin = (m.stats.wins && m.stats.wins.value > 0) || m.metadata.result === 'victory';
                    if (isWin) {
                        currentStreak = currentStreak >= 0 ? currentStreak + 1 : 1;
                    } else {
                        currentStreak = currentStreak <= 0 ? currentStreak - 1 : -1;
                    }
                });

                document.getElementById('session-wins').innerText = w;
                document.getElementById('session-losses').innerText = l;

                const streakEl = document.getElementById('win-streak');
                if (currentStreak > 0) {
                    streakEl.innerText = `+${currentStreak}`;
                    streakEl.className = 'plus';
                } else if (currentStreak < 0) {
                    streakEl.innerText = `${currentStreak}`;
                    streakEl.className = 'minus';
                } else {
                    streakEl.innerText = '0';
                    streakEl.className = 'streak';
                }

                const deltaEl = document.getElementById('mmr-delta');
                if (delta > 0) {
                    deltaEl.innerText = `+${delta}`;
                    deltaEl.className = 'value plus';
                } else if (delta < 0) {
                    deltaEl.innerText = `${delta}`;
                    deltaEl.className = 'value minus';
                } else {
                    deltaEl.innerText = '0';
                    deltaEl.className = 'value neutral';
                }
            } catch (e) { console.error('Błąd sesji:', e); }
        }

        update();
        updateSession();
        setInterval(update, 300000);
        setInterval(updateSession, 180000);
    </script>
</body>

</html>
