<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>RL Live Session Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800&display=swap');

        :root {
            --win-color: #00ff88;
            --loss-color: #ff3366;
            --streak-color: #ffffff;
        }

        body {
            background-color: transparent;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
            overflow: hidden;
        }

        .overlay {
            background: linear-gradient(145deg, var(--bg-color), rgba(10, 10, 10, 0.95));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 15px 45px 25px 45px;
            display: flex;
            gap: 50px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: background 0.3s;
        }

        .overlay::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 3px;
            border-radius: 3px 3px 0 0;
            opacity: 0.8;
            background: linear-gradient(90deg, transparent, var(--streak-color), transparent);
        }

        .stat-item {
            text-align: center;
            min-width: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .stat-item:nth-child(1)::after {
            content: "";
            position: absolute;
            right: -25px;
            top: 20%;
            height: 60%;
            width: 1px;
            background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.2), transparent);
        }

        .label {
            font-size: 16px;
            text-transform: uppercase;
            color: #dcdcdc;
            margin-bottom: 2px;
            font-weight: 700;
            letter-spacing: 0.15em;
        }

        .value {
            font-size: 46px;
            font-weight: 800;
            line-height: 1;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            transition: color 0.3s;
        }

        .plus { color: var(--win-color); }
        .minus { color: var(--loss-color); }
        .streak { color: var(--streak-color); }

        .wins .value { color: var(--win-color); }
        .losses .value { color: var(--loss-color); }

        .streak-info {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.95);
            padding: 6px 24px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            font-size: 18px;
            white-space: nowrap;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            letter-spacing: 0.08em;
            backdrop-filter: blur(5px);
            transition: color 0.3s;
        }

        #win-streak::after {
            content: " Streak";
            color: inherit;
        }
    </style>
    <style id="custom-css"></style>
</head>

<body>
    <div class="overlay">
        <div class="stat-item wins">
            <div class="label">Wygrane</div>
            <div id="session-wins" class="value">0</div>
        </div>

        <div class="stat-item losses">
            <div class="label">Przegrane</div>
            <div id="session-losses" class="value">0</div>
        </div>

        <div class="streak-info">
            <span id="win-streak" class="streak">0</span>
        </div>
    </div>

    <script>
        function connect() {
            const ws = new WebSocket(`ws://${window.location.host}/ws/sesja`);

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                document.getElementById('session-wins').innerText = data.wins;
                document.getElementById('session-losses').innerText = data.losses;

                const streakEl = document.getElementById('win-streak');
                if (data.streak > 0) {
                    streakEl.innerText = `+${data.streak}`;
                } else {
                    streakEl.innerText = `${data.streak}`;
                }
                streakEl.className = 'streak';

                if (data.settings) {
                    const root = document.documentElement;
                    if (data.settings.sesja_winColor) root.style.setProperty('--win-color', data.settings.sesja_winColor);
                    if (data.settings.sesja_lossColor) root.style.setProperty('--loss-color', data.settings.sesja_lossColor);
                    if (data.settings.sesja_streakColor) root.style.setProperty('--streak-color', data.settings.sesja_streakColor);
                    
                    if (data.settings.sesja_bgColor && data.settings.sesja_bgOpacity !== undefined) {
                        const hex = data.settings.sesja_bgColor;
                        const op = parseInt(data.settings.sesja_bgOpacity) / 100;
                        let r = 0, g = 0, b = 0;
                        if (hex.length === 4) {
                            r = parseInt(hex[1] + hex[1], 16);
                            g = parseInt(hex[2] + hex[2], 16);
                            b = parseInt(hex[3] + hex[3], 16);
                        } else if (hex.length === 7) {
                            r = parseInt(hex.substring(1, 3), 16);
                            g = parseInt(hex.substring(3, 5), 16);
                            b = parseInt(hex.substring(5, 7), 16);
                        }
                        root.style.setProperty('--bg-color', `rgba(${r}, ${g}, ${b}, ${op})`);
                    }

                    const customCssEl = document.getElementById('custom-css');
                    if (customCssEl && data.settings.sesja_customCss !== undefined) {
                        customCssEl.innerHTML = data.settings.sesja_customCss;
                    }
                }
            };

            ws.onclose = () => {
                setTimeout(connect, 2000);
            };
        }

        connect();
    </script>
</body>

</html>
