<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>RL Live Session Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap');

        body {
            background-color: transparent;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        .overlay {
            background: linear-gradient(180deg, #121212 0%, #050505 100%);
            border: 2px solid #2a2a2a;
            padding: 15px 35px;
            display: flex;
            gap: 40px;
            border-radius: 4px;
            position: relative;
            box-shadow: 0 8px 16px rgba(0,0,0,0.8);
        }

        .overlay::after {
            content: "";
            position: absolute;
            top: -2px; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
        }

        .stat-item {
            text-align: center;
            min-width: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .label {
            font-size: 14px;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: -5px;
            font-weight: 600;
        }

        .value {
            font-size: 48px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            line-height: 1;
        }

        .delta-value {
            font-size: 52px;
            font-weight: 800;
        }

        .plus { color: #2ecc71; }
        .minus { color: #e74c3c; }
        .neutral { color: #777; }

        .wins .value { color: #2ecc71; }
        .losses .value { color: #e74c3c; }

        .streak-info {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            padding: 2px 15px;
            border: 1px solid #2a2a2a;
            font-size: 14px;
            color: #ffd700;
            white-space: nowrap;
            font-weight: 700;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="overlay">
        <div class="stat-item wins">
            <div class="label">Wins</div>
            <div id="session-wins" class="value">0</div>
        </div>

        <div class="stat-item">
            <div id="mmr-delta" class="delta-value neutral">0</div>
        </div>

        <div class="stat-item losses">
            <div class="label">Losses</div>
            <div id="session-losses" class="value">0</div>
        </div>

        <div class="streak-info">
            <span id="streak-display">0 STREAK</span>
        </div>
    </div>

    <script>
        const pathParts = window.location.pathname.split('/');
        const modeUrl = pathParts[2]; 
        const NICK = pathParts[3];

        const modeMapping = {
            "1s": "Ranked Duel 1v1",
            "2s": "Ranked Doubles 2v2",
            "3s": "Ranked Standard 3v3"
        };

        const currentModeName = modeMapping[modeUrl] || modeMapping["3s"];

        async function updateStats() {
            try {
                const progRes = await fetch('/apiprogram/');
                const progJson = await progRes.json();
                const programStartTime = new Date(progJson.czas_startu);

                const sessRes = await fetch(`/apisesja/${NICK}`);
                const sessJson = await sessRes.json();

                let w = 0, l = 0, delta = 0;
                let sessionMatches = [];

                if (sessJson.data && sessJson.data.items) {
                    sessJson.data.items.forEach(session => {
                        if (session.matches) {
                            session.matches.forEach(m => {
                                const matchDate = new Date(m.metadata.dateCollected);
                                if (m.metadata.playlist === currentModeName && matchDate >= programStartTime) {
                                    
                                    sessionMatches.push(m);

                                    const matchWins = m.stats.wins ? m.stats.wins.value : 0;
                                    const matchPlayed = m.stats.matchesPlayed ? m.stats.matchesPlayed.value : 1;
                                    
                                    let actualWins = matchWins;
                                    if (matchWins === 0 && m.metadata.result === "victory") actualWins = 1;

                                    w += actualWins;
                                    l += (matchPlayed - actualWins);
                                    
                                    if (m.stats.rating && m.stats.rating.metadata && m.stats.rating.metadata.ratingDelta) {
                                        delta += m.stats.rating.metadata.ratingDelta;
                                    }
                                }
                            });
                        }
                    });
                }

                sessionMatches.sort((a, b) => new Date(a.metadata.dateCollected) - new Date(b.metadata.dateCollected));

                let currentStreak = 0;
                sessionMatches.forEach(m => {
                    const isWin = (m.stats.wins && m.stats.wins.value > 0) || m.metadata.result === "victory";
                    if (isWin) {
                        if (currentStreak >= 0) currentStreak++;
                        else currentStreak = 1;
                    } else {
                        if (currentStreak <= 0) currentStreak--;
                        else currentStreak = -1;
                    }
                });

                document.getElementById('session-wins').innerText = w;
                document.getElementById('session-losses').innerText = l;

                const streakEl = document.getElementById('streak-display');
                if (currentStreak > 0) {
                    streakEl.innerText = `+${currentStreak} STREAK`;
                    streakEl.style.color = "#2ecc71";
                } else if (currentStreak < 0) {
                    streakEl.innerText = `${currentStreak} STREAK`;
                    streakEl.style.color = "#e74c3c";
                } else {
                    streakEl.innerText = "0 STREAK";
                    streakEl.style.color = "#ffd700";
                }

                const deltaEl = document.getElementById('mmr-delta');
                if (delta > 0) {
                    deltaEl.innerText = `+${delta}`;
                    deltaEl.className = "delta-value plus";
                } else if (delta < 0) {
                    deltaEl.innerText = delta;
                    deltaEl.className = "delta-value minus";
                } else {
                    deltaEl.innerText = "0";
                    deltaEl.className = "delta-value neutral";
                }

            } catch (e) {
                console.error("Błąd:", e);
            }
        }

        setInterval(updateStats, 30000);
        updateStats();
    </script>
</body>
</html>
