<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: transparent !important;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --win-color: #00ff88;
            --loss-color: #ff3366;
            --streak-color: #ffffff;
            --bg-start: rgba(0, 0, 0, 0.95);
            --bg-end: rgba(0, 0, 0, 0.4);
        }

        .main {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .light {
            position: relative;
            min-width: 320px;
            width: fit-content;
            height: 90px;
            display: flex;
            align-items: center;
            padding: 0 70px 0 20px;
            gap: 15px;
            border-left: 4px solid rgba(255, 255, 255, 1);
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            animation: slideFromLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            -webkit-mask-image: linear-gradient(to right, black 0%, black 85%, transparent 100%);
            mask-image: linear-gradient(to right, black 0%, black 85%, transparent 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: linear-gradient(90deg, var(--bg-start) 0%, var(--bg-end) 100%);
            border-left-color: var(--streak-color);
        }

        @keyframes slideFromLeft {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .rank-icon {
            width: 65px;
            height: 65px;
            object-fit: contain;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.8));
            flex-shrink: 0;
        }

        .content {
            display: flex;
            flex-direction: column;
            color: white;
            white-space: nowrap;
        }

        .top-text {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: -1px;
        }

        .rank-text {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.1;
            margin: 0;
            color: var(--streak-color, #ffffff);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .mmr-container {
            font-size: 1.05rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 1px;
        }
    </style>
    <style id="custom-css"></style>
</head>

<body>
    <div class="main">
        <div class="light"> <img id="rank-img" src="" class="rank-icon" style="display: none;">
            <div class="content">
                <div id="mode-label" class="top-text">-</div>
                <div id="rank" class="rank-text">Loading...</div>
                <div id="mmr-box" class="mmr-container">MMR: <span id="mmr">-</span></div>
            </div>
        </div>
    </div>
    <script> const parts = window.location.pathname.split('/').filter(Boolean); const isRangaRoute = parts[0] === "ranga"; const mode = parts[1] || "2s"; const nick = parts[2] || "me"; const isPreview = isRangaRoute && !nick; const trackerModes = { "1s": "Tryb: 1v1", "2s": "Tryb: 2v2", "3s": "Tryb: 3v3" }; function setPreviewSSL() { document.getElementById('mode-label').innerText = "Tryb: 2v2 (Preview)"; document.getElementById('rank').innerText = "Supersonic Legend"; document.getElementById('mmr').innerText = "2000+"; const img = document.getElementById('rank-img'); img.src = "/img/ssl.png"; img.style.display = "block"; } function getRankImg(rankName) { const r = rankName.toLowerCase(); if (r.includes("supersonic")) return "/img/ssl.png"; if (r.includes("grand champion")) return "/img/gc1.png"; if (r.includes("champion")) return "/img/c1.png"; if (r.includes("diamond")) return "/img/d1.png"; if (r.includes("platinum")) return "/img/p1.png"; if (r.includes("gold")) return "/img/g1.png"; if (r.includes("silver")) return "/img/s1.png"; if (r.includes("bronze")) return "/img/b1.png"; return "/img/unranked.png"; } async function update() { if (isPreview) return; try { const res = await fetch("/apiranga/" + nick); const data = await res.json(); if (!data.data?.segments) return; const apiMode = mode === "1s" ? "Ranked Duel 1v1" : mode === "2s" ? "Ranked Doubles 2v2" : "Ranked Standard 3v3"; const seg = data.data.segments.find(s => s.metadata?.name === apiMode); if (!seg) return; document.getElementById('mode-label').innerText = trackerModes[mode] || mode; document.getElementById('rank').innerText = seg.stats.tier.metadata.name; document.getElementById('mmr').innerText = seg.stats.rating.value; const img = document.getElementById('rank-img'); img.src = getRankImg(seg.stats.tier.metadata.name); img.style.display = "block"; } catch (e) { console.log("API error", e); } } if (isPreview) { setPreviewSSL(); } else { update(); setInterval(update, 300000); } </script>
</body>

</html>
